name: metablooms-ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  boot-and-replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Locate boot verifier
        run: |
          test -f portable_full_os_boot_verify.py || test -f Metablooms_OS/portable_full_os_boot_verify.py
      - name: Run portable boot verifier
        run: |
          if test -f portable_full_os_boot_verify.py; then
            python3 -S portable_full_os_boot_verify.py
          elif test -f Metablooms_OS/portable_full_os_boot_verify.py; then
            cd Metablooms_OS
            python3 -S portable_full_os_boot_verify.py
          fi
      - name: Validate professionalization projection pack if present
        run: |
          if test -f runtime/professionalization/PROFESSIONALIZATION_CONVERGENCE_STAGE2_REAL_REPO_PROJECTION_AND_GITHUB_RULESET_PLAN/scripts/validate_stage2_projection.py; then
            python3 -S runtime/professionalization/PROFESSIONALIZATION_CONVERGENCE_STAGE2_REAL_REPO_PROJECTION_AND_GITHUB_RULESET_PLAN/scripts/validate_stage2_projection.py runtime/professionalization/PROFESSIONALIZATION_CONVERGENCE_STAGE2_REAL_REPO_PROJECTION_AND_GITHUB_RULESET_PLAN
          else
            echo "Stage 2 projection validator not present in this checkout layout; boot verifier remains authoritative."
          fi
