name: Bug report
about: Report a reproducible MetaBlooms defect
labels: [bug]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected governed behavior
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Artifact evidence
      description: Include paths, hashes, screenshots, receipts, exports, or replay proof.
    validations:
      required: true
